name: MPDADSS Lint Test

on:
  push:
    branches: [trunk, main, dev, prod]
  pull_request:
    branches: [trunk, dev, main, prod]

jobs:
  test:
    name: API Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

#      - name: Establish Prerequisites
#        run: |
#          cp .env.example .env
#          sed -i 's/^PROJECT_ENV=.*/PROJECT_ENV=TEST/' .env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pytest pytest-asyncio
          chmod +x ./run_lint_tests.sh

      - name: Run tests
        run: |
          # pytest app/tests/ --disable-warnings
          ./run_lint_tests.sh
