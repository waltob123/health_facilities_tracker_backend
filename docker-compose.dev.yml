services:
  health-facilities-tracker-db:
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD_DEV:-root_password}
      MYSQL_USER: ${DB_USER_DEV:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD_DEV:-user_password}
      MYSQL_DATABASE: ${DB_NAME_DEV:-health-facilities-tracker_db}
    ports:
      - ${DB_PORT_DEV:-3308}:3306
    volumes:
      - health-facilities-tracker-db-dev-data:/var/lib/mysql

volumes:
  health-facilities-tracker-db-dev-data:
